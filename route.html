      input.placeholder = "Stop (address or place)…";
      input.autocomplete = "off";
      if (prefillText) input.value = prefillText;

      const sug = document.createElement("div");
      sug.className = "suggestions";
      sug.setAttribute("aria-label", "Stop suggestions");

      inputWrap.appendChild(input);
      inputWrap.appendChild(sug);

      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "btn";
      removeBtn.textContent = "Remove";

      wrap.appendChild(inputWrap);
      wrap.appendChild(removeBtn);
      container.appendChild(wrap);

      const stop = { id, ll: null, label: "", inputEl: input, sugEl: sug, wrapEl: wrap };
      routeStops.push(stop);

      attachAutocompleteDynamic(input, sug, (lat, lng, label) => {
        stop.ll = L.latLng(lat, lng);
        stop.label = label;
        input.value = label;
        upsertStopMarker_(stop);
        map.setView(stop.ll, Math.max(map.getZoom(), 12));
      });

      removeBtn.addEventListener("click", () => {
        removeStopMarker_(id);
        routeStops = routeStops.filter(s => s.id !== id);
        wrap.remove();
      });
    }

    // =========================
    // ROUTE UI
    // =========================
    function initRouteUI() {
      const fromEl = document.getElementById("fromInput");
      const toEl = document.getElementById("toInput");

      attachAutocompleteStatic("fromInput", "fromSug", (lat, lng, label) => {
        const ll = L.latLng(lat, lng);
        routeStart = ll;
        if (routeStartMarker) map.removeLayer(routeStartMarker);
        routeStartMarker = L.marker(routeStart, { draggable: true }).addTo(map);
        routeStartMarker.on("dragend", async () => {
          routeStart = routeStartMarker.getLatLng();
          const addr = await reverseGeocode(routeStart.lat, routeStart.lng);
          if (addr) fromEl.value = addr;
        });
        fromEl.value = label;
        map.setView(ll, Math.max(map.getZoom(), 12));
      });

      attachAutocompleteStatic("toInput", "toSug", (lat, lng, label) => {
        const ll = L.latLng(lat, lng);
        routeEnd = ll;
        if (routeEndMarker) map.removeLayer(routeEndMarker);
        routeEndMarker = L.marker(routeEnd, { draggable: true }).addTo(map);
        routeEndMarker.on("dragend", async () => {
          routeEnd = routeEndMarker.getLatLng();
          const addr = await reverseGeocode(routeEnd.lat, routeEnd.lng);
          if (addr) toEl.value = addr;
        });
        toEl.value = label;
        map.setView(ll, Math.max(map.getZoom(), 12));
      });

      const addStopBtn = document.getElementById("addStopBtn");
      addStopBtn.addEventListener("click", () => addStopRow(""));

      const locateBtn = document.getElementById("locateBtn");
      const swapBtn = document.getElementById("swapBtn");
      const buildBtn = document.getElementById("routeBuildBtn");
      const clearBtn = document.getElementById("routeClearBtn");

      locateBtn.addEventListener("click", () => {
        if (!navigator.geolocation) {
          setRouteStatus("Geolocation not supported in this browser.");
          return;
        }
        setRouteStatus("Getting your location…");

        navigator.geolocation.getCurrentPosition(async (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;

          const ll = L.latLng(lat, lng);

          const icon = L.divIcon({ className: "", html: `<div class="player-icon"></div>`, iconSize: [22,22], iconAnchor: [11,11] });
          if (youMarker) map.removeLayer(youMarker);
          youMarker = L.marker(ll, { icon }).addTo(map);

          routeStart = ll;
          if (routeStartMarker) map.removeLayer(routeStartMarker);
          routeStartMarker = L.marker(routeStart, { draggable: true }).addTo(map);
          routeStartMarker.on("dragend", async () => {
            routeStart = routeStartMarker.getLatLng();
            const addr = await reverseGeocode(routeStart.lat, routeStart.lng);
            if (addr) fromEl.value = addr;
          });

          try {
            const addr = await reverseGeocode(lat, lng);
            if (addr) fromEl.value = addr;
          } catch {}

          map.setView(ll, Math.max(map.getZoom(), 12));
          setRouteStatus(`From set from your location. To: ${fmtLL(routeEnd)}.`);
        }, () => {
          setRouteStatus("Location failed. Allow location permission and try again.");
        }, { enableHighAccuracy: true, timeout: 12000 });
      });

      swapBtn.addEventListener("click", () => {
        const tmp = fromEl.value; fromEl.value = toEl.value; toEl.value = tmp;

        const tmpLL = routeStart; routeStart = routeEnd; routeEnd = tmpLL;

        // reverse stops order + keep text fields
        const stopTexts = routeStops.map(s => s.inputEl.value);
        routeStops.forEach((s, i) => { s.inputEl.value = stopTexts[stopTexts.length - 1 - i] || ""; s.ll = null; s.label = ""; });
        routeStops.reverse();

        if (routeStartMarker) { map.removeLayer(routeStartMarker); routeStartMarker = null; }
        if (routeEndMarker) { map.removeLayer(routeEndMarker); routeEndMarker = null; }

        if (routeStart) {
          routeStartMarker = L.marker(routeStart, { draggable: true }).addTo(map);
          routeStartMarker.on("dragend", async () => {
            routeStart = routeStartMarker.getLatLng();
            const addr = await reverseGeocode(routeStart.lat, routeStart.lng);
            if (addr) fromEl.value = addr;
          });
        }
        if (routeEnd) {
          routeEndMarker = L.marker(routeEnd, { draggable: true }).addTo(map);
          routeEndMarker.on("dragend", async () => {
            routeEnd = routeEndMarker.getLatLng();
            const addr = await reverseGeocode(routeEnd.lat, routeEnd.lng);
            if (addr) toEl.value = addr;
          });
        }

        setRouteStatus(`Direction swapped. Start: ${fmtLL(routeStart)} | End: ${fmtLL(routeEnd)}. Stops need re-picked (or Build to resolve).`);
      });

      buildBtn.addEventListener("click", async () => {
        setRouteStatus("Resolving From/To/Stops…");

        // Resolve From
        if (!routeStart) {
          const hit = await geocodeOne(fromEl.value);
          if (!hit) { setRouteStatus("Could not find From. Pick a suggestion or type a clearer address."); return; }
          routeStart = L.latLng(hit.lat, hit.lng);
          if (routeStartMarker) map.removeLayer(routeStartMarker);
          routeStartMarker = L.marker(routeStart, { draggable: true }).addTo(map);
          fromEl.value = hit.label;
        }

        // Resolve To
        if (!routeEnd) {
          const hit = await geocodeOne(toEl.value);
          if (!hit) { setRouteStatus("Could not find To. Pick a suggestion or type a clearer address."); return; }
          routeEnd = L.latLng(hit.lat, hit.lng);
          if (routeEndMarker) map.removeLayer(routeEndMarker);
          routeEndMarker = L.marker(routeEnd, { draggable: true }).addTo(map);
          toEl.value = hit.label;
        }

        // Resolve Stops (only those with text)
        for (const s of routeStops) {
          const txt = String(s.inputEl.value || "").trim();
          if (!txt) { s.ll = null; continue; }
          if (s.ll) continue;
          const hit = await geocodeOne(txt);
          if (!hit) { setRouteStatus(`Could not find a stop: "${txt}". Pick a suggestion or remove it.`); return; }
          s.ll = L.latLng(hit.lat, hit.lng);
          s.inputEl.value = hit.label;
          upsertStopMarker_(s);
          await sleep(120);
        }

        // Set draggable handlers now (after build resolves)
        if (routeStartMarker) {
          routeStartMarker.off("dragend");
          routeStartMarker.on("dragend", async () => {
            routeStart = routeStartMarker.getLatLng();
            const addr = await reverseGeocode(routeStart.lat, routeStart.lng);
            if (addr) fromEl.value = addr;
          });
        }
        if (routeEndMarker) {
          routeEndMarker.off("dragend");
          routeEndMarker.on("dragend", async () => {
            routeEnd = routeEndMarker.getLatLng();
            const addr = await reverseGeocode(routeEnd.lat, routeEnd.lng);
            if (addr) toEl.value = addr;
          });
        }
        const t0 = Date.now();
        const result = await buildRoute();
        setSidebarOpen(true);

        if (result && result.ok) {
          const clientId = getOrCreateClientId_();
          const stopsCount = routeStops.filter(s => s.ll).length;

          // States/provinces on route (from render analysis)
          const states = (routeStateGroups || []).map(g => g.isCanada ? ('CA:' + g.abbrev) : g.abbrev);

          postBuildLog_({
            event: 'route_build',
            clientId,
            provider: result.provider,
            miles: (typeof result.miles === 'number' && isFinite(result.miles)) ? result.miles : '',
            segments: result.segments || '',
            buildMs: Date.now() - t0,
            stopsCount,
            states: states.join(','),
            page: location.pathname || '',
            ref: document.referrer || ''
          });
        }
      });

      clearBtn.addEventListener("click", () => clearRoute());
    }

    // =========================
    // BOOTSTRAP
    // =========================
    async function bootstrap() {
      try {
        setStatus("Loading CSV data…");
        await Promise.all([loadCountyCsv(), loadStateAgencyCsv(), loadStateLawsCsv()]);

        setStatus("Loading US county shapes…");
        const usRes = await fetch(GEOJSON_URL);
        if (!usRes.ok) throw new Error("GeoJSON fetch failed (US): " + usRes.status);
        usGeojsonCache = await usRes.json();

        setStatus("Loading Canada shapes…");
        try {
          const caRes = await fetch(CANADA_GEOJSON_URL);
          if (caRes.ok) {
            const caGeo = await caRes.json();
            setStatus("Building Canada provinces…");
            canadaProvincesCache = dissolveCanadaToProvinces(caGeo);
          }
        } catch (e) {
          console.warn("Canada.json fetch error:", e);
        }

        map = L.map("map").setView(DEFAULT_CENTER, DEFAULT_ZOOM);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        map.createPane("countiesPane");
        map.getPane("countiesPane").style.zIndex = 650;

        indexUsGeojson();
        if (canadaProvincesCache) indexCanadaGeojson();
        buildSpatialIndexes();

        await buildCountyVectorLayer();
        if (canadaProvincesCache) await addCanadaLayer();
        // Thick state outlines on top
        await addStateBordersLayer();

        setTimeout(() => map.invalidateSize(), 0);
        window.addEventListener("resize", () => map.invalidateSize());

        initRouteUI();

        setSidebarOpen(false);
        setStatus("Ready. Use From/To suggestions, optionally add stops, then Build.");
      } catch (err) {
        console.error(err);
        setStatus("Error loading data. Open console for details.");
      }
    }

    bootstrap();
</script>
</body>
</html>
