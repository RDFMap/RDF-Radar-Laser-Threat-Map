<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Georgia Radar / Lidar Threat Map</title>

  <!-- Leaflet CSS -->
  <link
          rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    #map {
      flex: 2;
    }

    #sidebar {
      flex: 1;
      max-width: 400px;
      border-left: 1px solid #ddd;
      padding: 12px 16px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    #sidebar h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }

    #sidebar h2 {
      font-size: 16px;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    #county-name {
      font-weight: 600;
    }

    .record {
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .record-header {
      font-weight: 600;
      margin-bottom: 4px;
    }

    #status {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    #legend {
      font-size: 13px;
      margin-top: 12px;
    }

    #legend span.color-box {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 4px;
      border: 1px solid #ccc;
    }

    .filters {
      margin-top: 8px;
      margin-bottom: 8px;
    }

    .filter-btn {
      display: inline-block;
      margin: 2px 4px 2px 0;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 3px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      cursor: pointer;
    }

    .filter-btn.active {
      background: #333;
      color: #fff;
      border-color: #333;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="map"></div>
  <div id="sidebar">
    <h1>Georgia Enforcement Map</h1>
    <div id="status">Loading data…</div>

    <div class="filters">
      <span style="font-size:13px; margin-right:6px;">Filter:</span>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="k">K</button>
      <button class="filter-btn" data-filter="ka">Ka</button>
      <button class="filter-btn" data-filter="lidar">Lidar</button>
    </div>

    <h2>Selected County</h2>
    <div id="county-name">None selected</div>

    <h2>Agencies / Records</h2>
    <div id="records"></div>

    <div id="legend">
      <h2>How to use</h2>
      <ul>
        <li>Click a county on the map.</li>
        <li>Use the filter buttons to tint counties that have K / Ka / Lidar.</li>
      </ul>
      <p><span class="color-box" style="background:#f2f2f2;"></span> “All” = neutral counties with no tint.</p>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
></script>

<!-- PapaParse for CSV parsing -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
  // =========================
  // CONFIG – Georgia paths
  // =========================

  // CSV from Google Sheets (change if you move to local CSV)
  const CSV_URL =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4ZdepcnMW0OCvCvgRTWPFGSuaQ6u75caFu8zF_Sh-VY525EwU81XzaiJhnvQTCcfHndclCHAQv9DT/pub?gid=928733295&single=true&output=csv";

  // GeoJSON for Georgia
  const GEOJSON_URL = "States/georgia/countyLines.json";

  const countyDataMap = {};   // county name (lowercase) -> rows
  let geojsonLayer = null;
  let selectedLayer = null;

  // "all" | "k" | "ka" | "lidar"
  let activeFilter = "all";

  // =========================
  // CSV PARSER + HELPERS
  // =========================

  function parseCSV(text) {
    const parsed = Papa.parse(text, {
      header: true,
      skipEmptyLines: "greedy"
    });

    return parsed.data.map(raw => {
      const row = {};
      Object.keys(raw).forEach(k => {
        if (!k) return;
        const key = k.trim();
        row[key] = (raw[k] ?? "").toString().trim();
      });
      return row;
    });
  }

  function buildCountyMap(rows) {
    rows.forEach(row => {
      const name = (row["County"] || "").trim();
      if (!name) return;
      const key = name.toLowerCase();
      if (!countyDataMap[key]) countyDataMap[key] = [];
      countyDataMap[key].push(row);
    });
  }

  function hasValid(value) {
    if (!value) return false;
    const t = value.trim();
    if (!t) return false;
    return t.toLowerCase() !== "n/a";
  }

  function formatMulti(value) {
    if (!value) return "";
    return value
      .split(/;|\n/)
      .map(s => s.trim())
      .filter(Boolean)
      .join("<br>");
  }

  function getFilteredRecordsForCounty(countyName) {
    const key = countyName.toLowerCase();
    const all = countyDataMap[key] || [];

    return all.filter(row => {
      if (activeFilter === "k") return hasValid(row["K_band"]);
      if (activeFilter === "ka") return hasValid(row["Ka_band"]);
      if (activeFilter === "lidar") return hasValid(row["Lidar_Guns"]);
      return true; // "all"
    });
  }

  function countyHasBand(countyName, type) {
    const key = countyName.toLowerCase();
    const rows = countyDataMap[key] || [];
    return rows.some(row => {
      if (type === "k") return hasValid(row["K_band"]);
      if (type === "ka") return hasValid(row["Ka_band"]);
      if (type === "lidar") return hasValid(row["Lidar_Guns"]);
      return false;
    });
  }

  function getCountyStyle(countyName) {
    const base = {
      weight: 2,
      color: "#111",
      opacity: 1,
      fillColor: "#f2f2f2",
      fillOpacity: 0.35
    };

    if (!countyName) return base;

    if (activeFilter === "ka" && countyHasBand(countyName, "ka")) {
      base.fillColor = "blue";
      base.fillOpacity = 0.5;
    } else if (activeFilter === "k" && countyHasBand(countyName, "k")) {
      base.fillColor = "orange";
      base.fillOpacity = 0.5;
    } else if (activeFilter === "lidar" && countyHasBand(countyName, "lidar")) {
      base.fillColor = "red";
      base.fillOpacity = 0.5;
    }

    return base;
  }

  // =========================
  // UI HELPERS (SIDEBAR)
  // =========================

  function setStatus(msg) {
    document.getElementById("status").textContent = msg;
  }

  function clearRecords() {
    document.getElementById("records").innerHTML = "";
  }

  function renderCountyInfo(countyName) {
    const countyNameEl = document.getElementById("county-name");
    const recordsEl = document.getElementById("records");

    countyNameEl.textContent = countyName || "None selected";
    clearRecords();

    if (!countyName) return;

    const records = getFilteredRecordsForCounty(countyName);

    if (records.length === 0) {
      const msg =
        activeFilter === "all"
          ? "No data for this county yet."
          : `No data for this county for current filter (${activeFilter.toUpperCase()}).`;
      recordsEl.innerHTML = `<p>${msg}</p>`;
      return;
    }

    records.forEach((row, idx) => {
      const div = document.createElement("div");
      div.className = "record";

      const agency =
        row["Law_Enforcement_Agency_Name"] || "Unknown agency";

      const kaVal = hasValid(row["Ka_band"])
        ? formatMulti(row["Ka_band"])
        : "";
      const kVal = hasValid(row["K_band"])
        ? formatMulti(row["K_band"])
        : "";
      const lidar = hasValid(row["Lidar_Guns"])
        ? formatMulti(row["Lidar_Guns"])
        : "";
      const tactics = hasValid(row["Special_Tactics"])
        ? row["Special_Tactics"]
        : "";

      let bandsHtml = "";
      if (kaVal || kVal) {
        bandsHtml += `<div><strong>Bands</strong></div>`;
        if (kaVal) {
          bandsHtml += `<div>- <strong>Ka:</strong><br>${kaVal}</div>`;
        }
        if (kVal) {
          bandsHtml += `<div style="margin-top:4px;">- <strong>K:</strong><br>${kVal}</div>`;
        }
      }

      div.innerHTML = `
        <div class="record-header">${idx + 1}. ${agency}</div>
        ${bandsHtml}
        ${lidar ? `<div style="margin-top:6px;"><strong>Lidar:</strong><br>${lidar}</div>` : ""}
        ${tactics ? `<div><strong>Special tactics:</strong><br>${tactics}</div>` : ""}
      `;

      recordsEl.appendChild(div);
    });
  }

  function highlightLayer(layer) {
    const countyName = layer.feature?.properties?.NAME || "Unknown";

    if (selectedLayer && selectedLayer !== layer) {
      const oldName =
        selectedLayer.feature?.properties?.NAME || "Unknown";
      selectedLayer.setStyle(getCountyStyle(oldName));
    }

    selectedLayer = layer;
    const style = getCountyStyle(countyName);
    style.weight = 3;
    style.color = "#000";
    layer.setStyle(style);
  }

  function buildPopupHtml(countyName, row) {
    const agency =
      row["Law_Enforcement_Agency_Name"] || "Unknown agency";

    const kaVal = hasValid(row["Ka_band"])
      ? formatMulti(row["Ka_band"])
      : "";
    const kVal = hasValid(row["K_band"])
      ? formatMulti(row["K_band"])
      : "";
    const lidar = hasValid(row["Lidar_Guns"])
      ? formatMulti(row["Lidar_Guns"])
      : "";
    const tactics = hasValid(row["Special_Tactics"])
      ? row["Special_Tactics"]
      : "";

    let bandsHtml = "";
    if (kaVal || kVal) {
      bandsHtml += `<div><strong>Bands</strong></div>`;
      if (kaVal) {
        bandsHtml += `<div>- <strong>Ka:</strong><br>${kaVal}</div>`;
      }
      if (kVal) {
        bandsHtml += `<div style="margin-top:4px;">- <strong>K:</strong><br>${kVal}</div>`;
      }
    }

    return `
      <div>
        <div style="font-weight:600; margin-bottom:4px;">${countyName}</div>
        <div><strong>Main agency:</strong> ${agency}</div>
        ${bandsHtml ? `<div style="margin-top:6px;">${bandsHtml}</div>` : ""}
        ${lidar ? `<div style="margin-top:6px;"><strong>Lidar:</strong><br>${lidar}</div>` : ""}
        ${tactics ? `<div><strong>Special tactics:</strong><br>${tactics}</div>` : ""}
      </div>
    `;
  }

  // =========================
  // MAP SETUP
  // =========================

  function initMap(geojsonData) {
    const map = L.map("map");

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function style(feature) {
      const countyName =
        feature.properties && feature.properties.NAME
          ? feature.properties.NAME
          : null;
      return getCountyStyle(countyName);
    }

    function onEachFeature(feature, layer) {
      const countyName =
        feature.properties && feature.properties.NAME
          ? feature.properties.NAME
          : "Unknown";

      layer.on({
        click: function () {
          highlightLayer(layer);

          const records = getFilteredRecordsForCounty(countyName);

          map.fitBounds(layer.getBounds(), { maxZoom: 9 });

          renderCountyInfo(countyName);

          if (records.length === 0) {
            layer
              .bindPopup(
                `<strong>${countyName}</strong><br>No data for current filter.`
              )
              .openPopup();
          } else {
            const popupHtml = buildPopupHtml(countyName, records[0]);
            layer.bindPopup(popupHtml).openPopup();
          }
        },
        mouseover: function () {
          layer.setStyle({ weight: 3, color: "#000" });
          if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
            layer.bringToFront();
          }
        },
        mouseout: function () {
          if (selectedLayer === layer) {
            highlightLayer(layer);
          } else {
            const nm = countyName;
            layer.setStyle(getCountyStyle(nm));
          }
        }
      });
    }

    geojsonLayer = L.geoJSON(geojsonData, {
      style: style,
      onEachFeature: onEachFeature
    }).addTo(map);

    map.fitBounds(geojsonLayer.getBounds());

    setStatus("Data loaded. Click a county.");
  }

  // =========================
  // FILTER BUTTONS
  // =========================

  function initFilters() {
    const buttons = document.querySelectorAll(".filter-btn");
    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        const filter = btn.getAttribute("data-filter");
        activeFilter = filter;

        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        if (geojsonLayer) {
          geojsonLayer.setStyle(feature => {
            const name = feature.properties?.NAME || null;
            return getCountyStyle(name);
          });
        }

        const currentCounty =
          document.getElementById("county-name").textContent;
        if (currentCounty && currentCounty !== "None selected") {
          renderCountyInfo(currentCounty);
          if (selectedLayer) {
            highlightLayer(selectedLayer);
          }
        }
      });
    });
  }

  // =========================
  // BOOTSTRAP
  // =========================

  async function bootstrap() {
    try {
      initFilters();

      setStatus("Loading CSV data…");
      const csvRes = await fetch(CSV_URL);
      if (!csvRes.ok) throw new Error("CSV fetch failed: " + csvRes.status);
      const csvText = await csvRes.text();
      const rows = parseCSV(csvText);
      buildCountyMap(rows);

      setStatus("Loading county shapes…");
      const geoRes = await fetch(GEOJSON_URL);
      if (!geoRes.ok) throw new Error("GeoJSON fetch failed: " + geoRes.status);
      const geojsonData = await geoRes.json();

      initMap(geojsonData);
    } catch (err) {
      console.error(err);
      setStatus("Error loading data. Open console for details.");
    }
  }

  bootstrap();
</script>
</body>
</html>
