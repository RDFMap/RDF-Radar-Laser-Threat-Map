<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Enforcement Map</title>

  <link
          rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    #map { flex: 2; }

    #sidebar {
      flex: 1;
      max-width: 420px;
      border-left: 1px solid #ddd;
      padding: 12px 16px;
      box-sizing: border-box;
      overflow-y: auto;
      background: #fff;
    }

    #sidebar h1 { font-size: 20px; margin: 0 0 8px; }
    #sidebar h2 { font-size: 16px; margin-top: 16px; margin-bottom: 8px; }

    #county-name { font-weight: 600; }
    #status { font-size: 13px; color: #666; margin-top: 4px; }

    .filters { margin-top: 10px; margin-bottom: 10px; }
    .filter-btn {
      display: inline-block;
      margin: 2px 4px 2px 0;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      cursor: pointer;
    }
    .filter-btn.active {
      background: #333;
      color: #fff;
      border-color: #333;
    }

    .record {
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .record-header { font-weight: 700; margin-bottom: 6px; }
  </style>
</head>

<body>
<div id="app">
  <div id="map"></div>

  <div id="sidebar">
    <h1>Georgia Enforcement Map</h1>
    <div id="status">Loading data…</div>

    <div class="filters">
      <span style="font-size:13px; margin-right:6px;">Filter:</span>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="k">K</button>
      <button class="filter-btn" data-filter="ka">Ka</button>
      <button class="filter-btn" data-filter="lidar">Lidar</button>
    </div>

    <h2>Selected County</h2>
    <div id="county-name">None selected</div>

    <h2>Agencies / Records</h2>
    <div id="records"></div>
  </div>
</div>

<script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- VectorGrid (includes geojson-vt) -->
<script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.js"></script>

<script>
  // =========================
  // CONFIG
  // =========================

  // Your sheet CSV
  const CSV_URL =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4ZdepcnMW0OCvCvgRTWPFGSuaQ6u75caFu8zF_Sh-VY525EwU81XzaiJhnvQTCcfHndclCHAQv9DT/pub?gid=928733295&single=true&output=csv";

  // ALL US counties (repo root) — from your screenshot
  const GEOJSON_URL = "./allCounties.json";

  // Default view = USA
  const DEFAULT_VIEW = {
    center: [39.5, -98.35],
    zoom: 4
  };

  // =========================
  // STATE
  // =========================
  const countyDataMap = {}; // csv county -> rows
  let activeFilter = "all";

  let map = null;
  let vgLayer = null;
  let geojsonCache = null;

  let selectedFeatureId = null;

  // =========================
  // CSV + Helpers
  // =========================
  function setStatus(msg) {
    document.getElementById("status").textContent = msg;
  }

  function parseCSV(text) {
    const parsed = Papa.parse(text, { header: true, skipEmptyLines: "greedy" });
    return parsed.data.map(raw => {
      const row = {};
      Object.keys(raw).forEach(k => {
        if (!k) return;
        const key = k.trim();
        row[key] = (raw[k] ?? "").toString().trim();
      });
      return row;
    });
  }

  function buildCountyMap(rows) {
    rows.forEach(row => {
      const name = (row["County"] || "").trim();
      if (!name) return;
      const key = name.toLowerCase();
      if (!countyDataMap[key]) countyDataMap[key] = [];
      countyDataMap[key].push(row);
    });
  }

  function hasValid(v) {
    if (!v) return false;
    const t = String(v).trim();
    if (!t) return false;
    return t.toLowerCase() !== "n/a";
  }

  function formatMulti(value) {
    if (!value) return "";
    return String(value)
      .split(/;|\n/)
      .map(s => s.trim())
      .filter(Boolean)
      .join("<br>");
  }

  function normalizeCountyName(name) {
    if (!name) return "";
    return String(name).replace(/ County$/i, "").trim();
  }

  function getFilteredRecordsForCounty(countyName) {
    const key = normalizeCountyName(countyName).toLowerCase();
    const all = countyDataMap[key] || [];
    return all.filter(row => {
      if (activeFilter === "k") return hasValid(row["K_band"]);
      if (activeFilter === "ka") return hasValid(row["Ka_band"]);
      if (activeFilter === "lidar") return hasValid(row["Lidar_Guns"]);
      return true;
    });
  }

  function countyHasBand(countyName, type) {
    const key = normalizeCountyName(countyName).toLowerCase();
    const rows = countyDataMap[key] || [];
    return rows.some(row => {
      if (type === "k") return hasValid(row["K_band"]);
      if (type === "ka") return hasValid(row["Ka_band"]);
      if (type === "lidar") return hasValid(row["Lidar_Guns"]);
      return false;
    });
  }

  // =========================
  // Sidebar / Popup
  // =========================
  function renderCountyInfo(countyName) {
    const countyNameEl = document.getElementById("county-name");
    const recordsEl = document.getElementById("records");

    const clean = normalizeCountyName(countyName);
    countyNameEl.textContent = clean || "None selected";
    recordsEl.innerHTML = "";

    if (!clean) return;

    const records = getFilteredRecordsForCounty(clean);

    if (records.length === 0) {
      recordsEl.innerHTML =
        activeFilter === "all"
          ? "<p>No data for this county yet.</p>"
          : `<p>No data for this county for current filter (${activeFilter.toUpperCase()}).</p>`;
      return;
    }

    records.forEach((row, idx) => {
      const agency = row["Law_Enforcement_Agency_Name"] || "Unknown agency";

      const kaVal = hasValid(row["Ka_band"]) ? formatMulti(row["Ka_band"]) : "";
      const kVal  = hasValid(row["K_band"])  ? formatMulti(row["K_band"])  : "";
      const lidar = hasValid(row["Lidar_Guns"]) ? formatMulti(row["Lidar_Guns"]) : "";
      const tactics = hasValid(row["Special_Tactics"]) ? row["Special_Tactics"] : "";

      let bandsHtml = "";
      if (kaVal || kVal) {
        bandsHtml += `<div><strong>Bands</strong></div>`;
        if (kaVal) bandsHtml += `<div>- <strong>Ka:</strong><br>${kaVal}</div>`;
        if (kVal)  bandsHtml += `<div style="margin-top:4px;">- <strong>K:</strong><br>${kVal}</div>`;
      }

      const div = document.createElement("div");
      div.className = "record";
      div.innerHTML = `
        <div class="record-header">${idx + 1}. ${agency}</div>
        ${bandsHtml}
        ${lidar ? `<div style="margin-top:6px;"><strong>Lidar:</strong><br>${lidar}</div>` : ""}
        ${tactics ? `<div><strong>Special tactics:</strong><br>${tactics}</div>` : ""}
      `;

      recordsEl.appendChild(div);
    });
  }

  function buildPopupHtml(countyName, row) {
    const agency = row["Law_Enforcement_Agency_Name"] || "Unknown agency";

    const kaVal = hasValid(row["Ka_band"]) ? formatMulti(row["Ka_band"]) : "";
    const kVal  = hasValid(row["K_band"])  ? formatMulti(row["K_band"])  : "";
    const lidar = hasValid(row["Lidar_Guns"]) ? formatMulti(row["Lidar_Guns"]) : "";
    const tactics = hasValid(row["Special_Tactics"]) ? row["Special_Tactics"] : "";

    let bandsHtml = "";
    if (kaVal || kVal) {
      bandsHtml += `<div><strong>Bands</strong></div>`;
      if (kaVal) bandsHtml += `<div>- <strong>Ka:</strong><br>${kaVal}</div>`;
      if (kVal)  bandsHtml += `<div style="margin-top:4px;">- <strong>K:</strong><br>${kVal}</div>`;
    }

    return `
      <div>
        <div style="font-weight:700; margin-bottom:4px;">${normalizeCountyName(countyName)}</div>
        <div><strong>Main agency:</strong> ${agency}</div>
        ${bandsHtml ? `<div style="margin-top:6px;">${bandsHtml}</div>` : ""}
        ${lidar ? `<div style="margin-top:6px;"><strong>Lidar:</strong><br>${lidar}</div>` : ""}
        ${tactics ? `<div><strong>Special tactics:</strong><br>${tactics}</div>` : ""}
      </div>
    `;
  }

  // =========================
  // VectorGrid
  // =========================
  function featureIdFromProps(props) {
    return props.GEOID || props.geoid || props.NAME || props.name || JSON.stringify(props).slice(0,80);
  }

  function styleForProps(props) {
    // Works for most county geojsons:
    const name = normalizeCountyName(props.NAME || props.name || props.NAMELSAD || "Unknown");

    const s = {
      weight: 1.6,
      color: "#111",
      opacity: 1,
      fill: true,
      fillColor: "#f2f2f2",
      fillOpacity: 0.2
    };

    if (activeFilter === "ka" && countyHasBand(name, "ka")) {
      s.fillColor = "blue"; s.fillOpacity = 0.5;
    } else if (activeFilter === "k" && countyHasBand(name, "k")) {
      s.fillColor = "orange"; s.fillOpacity = 0.5;
    } else if (activeFilter === "lidar" && countyHasBand(name, "lidar")) {
      s.fillColor = "red"; s.fillOpacity = 0.5;
    }

    return s;
  }

  async function rebuildVectorGrid() {
    if (!geojsonCache) return;

    if (vgLayer) {
      map.removeLayer(vgLayer);
      vgLayer = null;
      selectedFeatureId = null;
    }

    vgLayer = L.vectorGrid.slicer(geojsonCache, {
      maxZoom: 12,
      tolerance: 3,      // more = blockier when zoomed out
      extent: 4096,
      buffer: 256,
      rendererFactory: L.canvas.tile,
      interactive: true,
      getFeatureId: f => featureIdFromProps(f.properties || {}),
      vectorTileLayerStyles: {
        sliced: (props) => styleForProps(props)
      }
    });

    vgLayer.addTo(map);

    vgLayer.on("click", (e) => {
      const props = (e.layer && e.layer.properties) ? e.layer.properties : (e.properties || {});
      const rawName = props.NAME || props.name || props.NAMELSAD || "Unknown";
      const countyName = normalizeCountyName(rawName);

      renderCountyInfo(countyName);

      const id = featureIdFromProps(props);

      if (selectedFeatureId) vgLayer.resetFeatureStyle(selectedFeatureId);
      selectedFeatureId = id;

      const sel = styleForProps(props);
      sel.weight = 3;
      sel.color = "#000";
      vgLayer.setFeatureStyle(id, sel);

      const records = getFilteredRecordsForCounty(countyName);
      const html = records.length
        ? buildPopupHtml(countyName, records[0])
        : `<strong>${countyName}</strong><br>No data for current filter.`;

      L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
    });
  }

  // =========================
  // Filters
  // =========================
  function initFilters() {
    const buttons = document.querySelectorAll(".filter-btn");
    buttons.forEach(btn => {
      btn.addEventListener("click", async () => {
        const filter = btn.getAttribute("data-filter");
        activeFilter = filter;

        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        // redraw layer so colors apply everywhere
        await rebuildVectorGrid();

        // if a county is selected, refresh sidebar
        const currentCounty = document.getElementById("county-name").textContent;
        if (currentCounty && currentCounty !== "None selected") {
          renderCountyInfo(currentCounty);
        }
      });
    });
  }

  // =========================
  // Boot
  // =========================
  async function bootstrap() {
    try {
      setStatus("Loading CSV data…");
      const csvRes = await fetch(CSV_URL);
      if (!csvRes.ok) throw new Error("CSV fetch failed: " + csvRes.status);
      const csvText = await csvRes.text();
      const rows = parseCSV(csvText);
      buildCountyMap(rows);

      setStatus("Loading county shapes…");
      const geoRes = await fetch(GEOJSON_URL);
      if (!geoRes.ok) throw new Error("GeoJSON fetch failed: " + geoRes.status);
      geojsonCache = await geoRes.json();

      // Create map and FORCE initial USA view
      map = L.map("map").setView(DEFAULT_VIEW.center, DEFAULT_VIEW.zoom);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      initFilters();
      await rebuildVectorGrid();

      setStatus("Data loaded. Click a county.");
    } catch (err) {
      console.error(err);
      setStatus("Error loading data. Open console for details.");
    }
  }

  bootstrap();
</script>
</body>
</html>
