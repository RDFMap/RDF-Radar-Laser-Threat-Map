<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Enforcement Map</title>

  <link
          rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""
  />

  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    #app { display: flex; height: 100vh; width: 100vw; }
    #map { flex: 2; min-width: 0; }

    #sidebar {
      flex: 1;
      max-width: 440px;
      border-left: 1px solid #ddd;
      padding: 12px 16px;
      box-sizing: border-box;
      overflow-y: auto;
      background: #fff;
    }
    #sidebar h1 { font-size: 20px; margin: 0 0 8px; }
    #sidebar h2 { font-size: 16px; margin-top: 16px; margin-bottom: 8px; }
    #status { font-size: 13px; color: #666; margin-top: 4px; }
    #county-name, #state-name { font-weight: 700; }

    .filters { margin: 10px 0; }
    .filters-title { font-size:13px; font-weight:600; margin-bottom: 6px; }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .filter-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 60px;
      padding: 6px 10px 5px;
      font-size: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #f7f7f7;
      cursor: pointer;
      user-select: none;
      line-height: 1.1;
    }

    .filter-btn .tick {
      margin-top: 4px;
      font-size: 14px;
      line-height: 14px;
      visibility: hidden;
    }

    .filter-btn.active {
      background: #333;
      color: #fff;
      border-color: #333;
    }
    .filter-btn.active .tick { visibility: visible; }

    .filter-btn.disabled { opacity: 0.45; cursor: not-allowed; }

    /* Ka split button + dropdown arrow */
    .ka-split {
      position: relative;
      display: inline-flex;
      align-items: stretch;
      gap: 0;
    }

    .ka-split .filter-btn {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }

    .ka-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      padding: 0;
      border: 1px solid #ccc;
      border-left: 0;
      background: #f7f7f7;
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      user-select: none;
    }

    .ka-arrow.active {
      background: #333;
      color: #fff;
      border-color: #333;
    }

    .ka-arrow.disabled { opacity: 0.45; cursor: not-allowed; }

    .ka-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 9999;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      display: none;
      min-width: 220px;
    }

    .ka-dropdown.open { display: block; }

    .ka-dropdown select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 12px;
    }

    .record {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .record-header { font-weight: 700; margin-bottom: 6px; }

    .flagline { margin-top: 6px; }
    .flagline div { margin-top: 3px; }

    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>

<body>
<div id="app">
  <div id="map"></div>

  <div id="sidebar">
    <h1>Enforcement Map</h1>
    <div id="status">Loading…</div>

    <div class="filters">
      <div class="filters-title">Filters (multi-select):</div>

      <div class="filter-bar" id="filterBar">
        <!-- State mode toggle -->
        <button class="filter-btn" id="stateModeBtn" type="button">
          <div>State</div><div class="tick">✅</div>
        </button>

        <button class="filter-btn active" data-filter="all" type="button">
          <div>All</div><div class="tick">✅</div>
        </button>

        <button class="filter-btn active" data-filter="x" type="button">
          <div>X</div><div class="tick">✅</div>
        </button>

        <button class="filter-btn active" data-filter="k" type="button">
          <div>K</div><div class="tick">✅</div>
        </button>

        <!-- Ka button with dropdown arrow -->
        <div class="ka-split" id="kaSplit">
          <button class="filter-btn active" data-filter="ka" type="button">
            <div>Ka</div><div class="tick">✅</div>
          </button>
          <button class="ka-arrow" id="kaArrowBtn" type="button" aria-label="Ka frequency options">▾</button>

          <div class="ka-dropdown" id="kaDropdown">
            <select id="kaFreqSelect">
              <option value="off">Ka (normal)</option>
              <option value="any">Ka Freq: Any</option>
              <option value="33.8">Ka Freq: 33.8</option>
              <option value="34.7">Ka Freq: 34.7</option>
              <option value="35.5">Ka Freq: 35.5</option>
            </select>
          </div>
        </div>

        <button class="filter-btn active" data-filter="lidar" type="button">
          <div>Lidar</div><div class="tick">✅</div>
        </button>

        <button class="filter-btn active" data-filter="de" type="button">
          <div>DE</div><div class="tick">✅</div>
        </button>
      </div>

      <div class="hint" id="modeHint" style="display:none;">
        State Mode is on. Click a state to view state agencies.
      </div>
    </div>

    <!-- County UI -->
    <div id="countyPanel">
      <h2>Selected County</h2>
      <div id="county-name">None selected</div>

      <h2>Agencies / Records</h2>
      <div id="records"></div>
    </div>

    <!-- State UI -->
    <div id="statePanel" style="display:none;">
      <h2>Selected State</h2>
      <div id="state-name">None selected</div>

      <h2>State Agencies / Records</h2>
      <div id="state-records"></div>
    </div>
  </div>
</div>

<script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.js"></script>

<script>
  // =========================
  // CONFIG
  // =========================
  const COUNTY_CSV_URL =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4ZdepcnMW0OCvCvgRTWPFGSuaQ6u75caFu8zF_Sh-VY525EwU81XzaiJhnvQTCcfHndclCHAQv9DT/pub?gid=2097640781&single=true&output=csv";

  const STATE_AGENCY_CSV_URL =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4ZdepcnMW0OCvCvgRTWPFGSuaQ6u75caFu8zF_Sh-VY525EwU81XzaiJhnvQTCcfHndclCHAQv9DT/pub?gid=507352241&single=true&output=csv";

  const GEOJSON_URL = "./allCounties.json";
  const STATE_BORDERS_URL = "./StateBorders.json";

  const DEFAULT_CENTER = [39.5, -98.35];
  const DEFAULT_ZOOM = 4;

  const FILTERS = ["x", "k", "ka", "lidar", "de"];

  // =========================
  // STATE NAME MAP (fallback)
  // =========================
  const STATE_NAME_MAP = {
    AL:"Alabama", AK:"Alaska", AZ:"Arizona", AR:"Arkansas", CA:"California", CO:"Colorado", CT:"Connecticut", DE:"Delaware",
    FL:"Florida", GA:"Georgia", HI:"Hawaii", ID:"Idaho", IL:"Illinois", IN:"Indiana", IA:"Iowa", KS:"Kansas", KY:"Kentucky",
    LA:"Louisiana", ME:"Maine", MD:"Maryland", MA:"Massachusetts", MI:"Michigan", MN:"Minnesota", MS:"Mississippi",
    MO:"Missouri", MT:"Montana", NE:"Nebraska", NV:"Nevada", NH:"New Hampshire", NJ:"New Jersey", NM:"New Mexico",
    NY:"New York", NC:"North Carolina", ND:"North Dakota", OH:"Ohio", OK:"Oklahoma", OR:"Oregon", PA:"Pennsylvania",
    RI:"Rhode Island", SC:"South Carolina", SD:"South Dakota", TN:"Tennessee", TX:"Texas", UT:"Utah", VT:"Vermont",
    VA:"Virginia", WA:"Washington", WV:"West Virginia", WI:"Wisconsin", WY:"Wyoming",
    DC:"District of Columbia"
  };

  // =========================
  // KA FREQ KEYWORDS
  // =========================
  const KA_338 = [
    /33\.8/i, /\bbee\b/i, /\bpython\b/i, /\benforcer\b/i, /\branger\b/i, /\bmph\b/i,
    /\bspeed\s*gun\b/i, /\bspeedgun\b/i
  ];
  const KA_347 = [
    /34\.7/i, /\bstalker\b/i, /\bdsr\b/i, /\bdual\b/i, /\b2x\b/i, /\bmdr\b/i, /\bsdr\b/i, /\bsl\b/i, /\batr\b/i
  ];
  const KA_355 = [
    /35\.5/i, /\bgolden\b/i, /\beagle\b/i, /\bkustom\b/i, /\bdecatur\b/i, /\braptor\b/i, /\bgenesis\b/i,
    /\bscout\b/i, /\bghd\b/i, /\btalon\b/i, /\brp-?1\b/i
  ];

  // =========================
  // STATE
  // =========================
  let map, vgLayer, geojsonCache;

  let statesLayer = null;          // clickable state polygons layer
  let stateMode = false;           // <--- NEW

  let selectedId = null;
  let lastClickedProps = null;

  // Normal mode filters
  let allMode = true;
  let selectedFilters = new Set(FILTERS);

  // Ka Frequency Mode state
  let kaFreqMode = false;
  let kaFreqChoice = "any";
  let savedAllMode = true;
  let savedSelectedFilters = new Set(FILTERS);

  // County data
  const rowsByGeoid = new Map();
  const hasX = new Set();
  const hasK = new Set();
  const hasKa = new Set();
  const hasLidar = new Set();
  const hasDE = new Set();
  const hasKa338 = new Set();
  const hasKa347 = new Set();
  const hasKa355 = new Set();
  const hasAnyData = new Set();

  // State agency data
  const rowsByState = new Map();   // "GA" -> [rows]
  let lastClickedStateAbbrev = null;

  // =========================
  // HELPERS
  // =========================
  function setStatus(msg) {
    document.getElementById("status").textContent = msg;
  }

  function hasValid(v) {
    if (v === undefined || v === null) return false;
    const t = String(v).trim();
    if (!t) return false;
    return t.toLowerCase() !== "n/a";
  }

  function isYes(v) {
    if (v === undefined || v === null) return false;
    return String(v).trim().toLowerCase() === "y";
  }

  function getField(row, ...keys) {
    for (const k of keys) {
      if (!k) continue;
      if (row[k] !== undefined) return row[k];

      const target = String(k).trim().toLowerCase().replace(/\s+/g, " ");
      for (const rk of Object.keys(row)) {
        const norm = String(rk).trim().toLowerCase().replace(/\s+/g, " ");
        if (norm === target) return row[rk];
      }
    }
    return "";
  }

  function containsDE(val) {
    if (!hasValid(val)) return false;
    return /\bDE[A-Z0-9_-]*\b/i.test(String(val));
  }

  function matchAnyRegex(text, regexList) {
    if (!hasValid(text)) return false;
    const s = String(text);
    return regexList.some(r => r.test(s));
  }

  function detectKaFreqsFromText(kaText) {
    return {
      f338: matchAnyRegex(kaText, KA_338),
      f347: matchAnyRegex(kaText, KA_347),
      f355: matchAnyRegex(kaText, KA_355)
    };
  }

  function formatMulti(value) {
    if (!value) return "";
    return String(value)
      .split(/;|\n/)
      .map(s => s.trim())
      .filter(Boolean)
      .join("<br>");
  }

  function normalizeGeoid(v) {
    let t = String(v ?? "").trim();
    if (!t) return "";

    if (/^\d{5}$/.test(t)) return t;

    if (/^\d+(\.\d+)?$/.test(t)) {
      const n = Math.floor(Number(t));
      if (Number.isFinite(n)) {
        const s = String(n).padStart(5, "0");
        if (/^\d{5}$/.test(s)) return s;
      }
    }

    const digits = t.replace(/\D/g, "");
    if (digits.length === 5) return digits;

    if (digits.length === 6 && digits.endsWith("0")) {
      const maybe = digits.slice(0, 5);
      if (/^\d{5}$/.test(maybe)) return maybe;
    }

    return "";
  }

  function flagsHtmlFromRow(row) {
    const overpass = isYes(getField(row, "Overpass_shots", "Overpass shots", "Overpass"));
    const rear     = isYes(getField(row, "Rear_shots", "Rear shots", "Rear"));
    const ghost    = isYes(getField(row, "Ghost or Unmarked Unit", "Ghost/Unmarked", "Ghost", "Unmarked Unit"));

    const lines = [];
    if (overpass) lines.push(`Overpass Shots: ✅`);
    if (rear)     lines.push(`Rear Shots: ✅`);
    if (ghost)    lines.push(`Ghost/Unmarked: ✅`);

    if (lines.length === 0) return "";
    return `<div class="flagline">${lines.map(l => `<div>${l}</div>`).join("")}</div>`;
  }

  function rowHasAnyContent(row) {
    const core = hasValid(row["K_band"]) || hasValid(row["Ka_band"]) || hasValid(row["Lidar_Guns"]);
    if (core) return true;

    if (hasValid(row["Special_Tactics"])) return true;
    if (isYes(getField(row, "Overpass_shots", "Overpass shots", "Overpass"))) return true;
    if (isYes(getField(row, "Rear_shots", "Rear shots", "Rear"))) return true;
    if (isYes(getField(row, "Ghost or Unmarked Unit", "Ghost/Unmarked", "Ghost", "Unmarked Unit"))) return true;

    return false;
  }

  function rowMatchesFilter(row, f) {
    if (f === "x") return hasValid(row["X_band"]);
    if (f === "k") return hasValid(row["K_band"]);
    if (f === "ka") return hasValid(row["Ka_band"]);
    if (f === "lidar") return hasValid(row["Lidar_Guns"]);
    if (f === "de") return containsDE(row["Lidar_Guns"]);
    return false;
  }

  function rowMatchesKaFreq(row, choice) {
    if (!hasValid(row["Ka_band"])) return false;
    const d = detectKaFreqsFromText(row["Ka_band"]);
    if (choice === "33.8") return d.f338;
    if (choice === "34.7") return d.f347;
    if (choice === "35.5") return d.f355;
    return (d.f338 || d.f347 || d.f355);
  }

  function countyMatchesFilterSet(geoid, f) {
    if (f === "x") return hasX.has(geoid);
    if (f === "k") return hasK.has(geoid);
    if (f === "ka") return hasKa.has(geoid);
    if (f === "lidar") return hasLidar.has(geoid);
    if (f === "de") return hasDE.has(geoid);
    return false;
  }

  function countyMatchesKaFreqSet(geoid, choice) {
    if (choice === "33.8") return hasKa338.has(geoid);
    if (choice === "34.7") return hasKa347.has(geoid);
    if (choice === "35.5") return hasKa355.has(geoid);
    return (hasKa338.has(geoid) || hasKa347.has(geoid) || hasKa355.has(geoid));
  }

  // Robust state abbrev getter from GeoJSON props or CSV row
  function normalizeStateAbbrev(v) {
    const t = String(v ?? "").trim().toUpperCase();
    if (/^[A-Z]{2}$/.test(t)) return t;
    return "";
  }

  function getStateAbbrevFromProps(p) {
    const candidates = [
      p.STUSPS, p.stusps,
      p.STATE, p.state,
      p.POSTAL, p.postal,
      p.ABBR, p.abbr,
      p.USPS, p.usps
    ];
    for (const c of candidates) {
      const ab = normalizeStateAbbrev(c);
      if (ab) return ab;
    }
    return "";
  }

  function getStateNameFromProps(p, ab) {
    const name = p.NAME || p.name || p.State || p.STATE_NAME || p.state_name || "";
    if (hasValid(name)) return String(name).trim();
    return STATE_NAME_MAP[ab] || ab || "Unknown";
  }

  // =========================
  // LOAD COUNTY CSV
  // =========================
  async function loadCountyCsv() {
    const res = await fetch(COUNTY_CSV_URL);
    if (!res.ok) throw new Error("County CSV fetch failed: " + res.status);
    const text = await res.text();

    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });

    rowsByGeoid.clear();
    hasX.clear(); hasK.clear(); hasKa.clear(); hasLidar.clear(); hasDE.clear();
    hasKa338.clear(); hasKa347.clear(); hasKa355.clear();
    hasAnyData.clear();

    let validRowCount = 0;

    for (const raw of parsed.data) {
      if (!raw) continue;

      const geoid = normalizeGeoid(raw.GEOID);
      if (!geoid) continue;

      validRowCount++;

      const row = {};
      for (const k of Object.keys(raw)) {
        if (!k) continue;
        row[k.trim()] = (raw[k] ?? "").toString().trim();
      }

      if (!rowsByGeoid.has(geoid)) rowsByGeoid.set(geoid, []);
      rowsByGeoid.get(geoid).push(row);

      if (hasValid(row["X_band"])) hasX.add(geoid);
      if (hasValid(row["K_band"])) hasK.add(geoid);

      if (hasValid(row["Ka_band"])) {
        hasKa.add(geoid);
        const d = detectKaFreqsFromText(row["Ka_band"]);
        if (d.f338) hasKa338.add(geoid);
        if (d.f347) hasKa347.add(geoid);
        if (d.f355) hasKa355.add(geoid);
      }

      if (hasValid(row["Lidar_Guns"])) hasLidar.add(geoid);
      if (containsDE(row["Lidar_Guns"])) hasDE.add(geoid);

      if (rowHasAnyContent(row)) hasAnyData.add(geoid);
    }

    console.log("Loaded county rows:", validRowCount);
  }

  // =========================
  // LOAD STATE AGENCY CSV
  // =========================
  async function loadStateAgencyCsv() {
    const res = await fetch(STATE_AGENCY_CSV_URL);
    if (!res.ok) throw new Error("State Agency CSV fetch failed: " + res.status);
    const text = await res.text();

    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });

    rowsByState.clear();
    let rowCount = 0;

    for (const raw of parsed.data) {
      if (!raw) continue;

      // Expect a "State" or "ST" or "Abbrev" column; handle robustly
      const stateAbbrev =
        normalizeStateAbbrev(raw.State) ||
        normalizeStateAbbrev(raw.STATE) ||
        normalizeStateAbbrev(raw.ST) ||
        normalizeStateAbbrev(raw.STUSPS) ||
        normalizeStateAbbrev(raw.Abbrev) ||
        normalizeStateAbbrev(raw.ABBR);

      if (!stateAbbrev) continue;

      const row = {};
      for (const k of Object.keys(raw)) {
        if (!k) continue;
        row[k.trim()] = (raw[k] ?? "").toString().trim();
      }

      if (!rowsByState.has(stateAbbrev)) rowsByState.set(stateAbbrev, []);
      rowsByState.get(stateAbbrev).push(row);
      rowCount++;
    }

    console.log("Loaded state agency rows:", rowCount);
  }

  // =========================
  // FILTERING
  // =========================
  function passesCurrentFilters(row) {
    if (kaFreqMode) return rowMatchesKaFreq(row, kaFreqChoice);

    if (allMode) return rowHasAnyContent(row);
    if (selectedFilters.size === 0) return false;

    for (const f of selectedFilters) {
      if (rowMatchesFilter(row, f)) return true;
    }
    return false;
  }

  // =========================
  // PANELS TOGGLE
  // =========================
  function setPanelsForMode() {
    const countyPanel = document.getElementById("countyPanel");
    const statePanel  = document.getElementById("statePanel");
    const hint = document.getElementById("modeHint");

    countyPanel.style.display = stateMode ? "none" : "block";
    statePanel.style.display  = stateMode ? "block" : "none";
    hint.style.display = stateMode ? "block" : "none";
  }

  // =========================
  // COUNTY RENDER
  // =========================
  function renderCountyInfo(props) {
    const countyNameEl = document.getElementById("county-name");
    const recordsEl = document.getElementById("records");

    const name = props.NAME || props.name || props.NAMELSAD || "Unknown";
    const st = props.STUSPS || props.STATE_NAME || props.state || "";
    const geoid = normalizeGeoid(props.GEOID || props.geoid || props.GEOID10 || props.GEO_ID || "");

    countyNameEl.textContent = st ? `${name}, ${st}` : name;
    recordsEl.innerHTML = "";

    const all = rowsByGeoid.get(geoid) || [];
    const filtered = all.filter(passesCurrentFilters);

    if (filtered.length === 0) {
      recordsEl.innerHTML = "<p>No data for this county yet.</p>";
      return;
    }

    filtered.forEach((row, idx) => {
      const agency = row["Law_Enforcement_Agency_Name"] || "Unknown agency";

      const xVal  = hasValid(row["X_band"])  ? formatMulti(row["X_band"])  : "";
      const kaVal = hasValid(row["Ka_band"]) ? formatMulti(row["Ka_band"]) : "";
      const kVal  = hasValid(row["K_band"])  ? formatMulti(row["K_band"])  : "";
      const lidar = hasValid(row["Lidar_Guns"]) ? formatMulti(row["Lidar_Guns"]) : "";
      const tactics = hasValid(row["Special_Tactics"]) ? row["Special_Tactics"] : "";
      const flags = flagsHtmlFromRow(row);

      let bandsHtml = "";
      if (xVal || kaVal || kVal) {
        bandsHtml += `<div><strong>Bands</strong></div>`;
        if (xVal)  bandsHtml += `<div>- <strong>X:</strong><br>${xVal}</div>`;
        if (kaVal) bandsHtml += `<div style="margin-top:4px;">- <strong>Ka:</strong><br>${kaVal}</div>`;
        if (kVal)  bandsHtml += `<div style="margin-top:4px;">- <strong>K:</strong><br>${kVal}</div>`;
      }

      const div = document.createElement("div");
      div.className = "record";
      div.innerHTML = `
        <div class="record-header">${idx + 1}. ${agency}</div>
        ${bandsHtml}
        ${lidar ? `<div style="margin-top:6px;"><strong>Lidar:</strong><br>${lidar}</div>` : ""}
        ${flags ? `${flags}` : ""}
        ${tactics ? `<div style="margin-top:6px;"><strong>Special tactics:</strong><br>${tactics}</div>` : ""}
      `;
      recordsEl.appendChild(div);
    });
  }

  function popupHtml(props) {
    const name = props.NAME || props.name || props.NAMELSAD || "Unknown";
    const st = props.STUSPS || props.STATE_NAME || props.state || "";
    const geoid = normalizeGeoid(props.GEOID || props.geoid || props.GEOID10 || props.GEO_ID || "");

    const all = rowsByGeoid.get(geoid) || [];
    const row = all.find(passesCurrentFilters);

    if (!row) {
      return `<strong>${st ? `${name}, ${st}` : name}</strong><br>No data for the selected filters.`;
    }

    const agency = row["Law_Enforcement_Agency_Name"] || "Unknown agency";
    const kaVal = hasValid(row["Ka_band"]) ? formatMulti(row["Ka_band"]) : "";
    const kVal  = hasValid(row["K_band"])  ? formatMulti(row["K_band"])  : "";
    const xVal  = hasValid(row["X_band"])  ? formatMulti(row["X_band"])  : "";
    const lidar = hasValid(row["Lidar_Guns"]) ? formatMulti(row["Lidar_Guns"]) : "";

    let bandsHtml = "";
    if (xVal || kaVal || kVal) {
      bandsHtml += `<div><strong>Bands</strong></div>`;
      if (xVal)  bandsHtml += `<div>- <strong>X:</strong><br>${xVal}</div>`;
      if (kaVal) bandsHtml += `<div style="margin-top:4px;">- <strong>Ka:</strong><br>${kaVal}</div>`;
      if (kVal)  bandsHtml += `<div style="margin-top:4px;">- <strong>K:</strong><br>${kVal}</div>`;
    }

    return `
      <div>
        <div style="font-weight:700; margin-bottom:4px;">${st ? `${name}, ${st}` : name}</div>
        <div><strong>Main agency:</strong> ${agency}</div>
        ${bandsHtml ? `<div style="margin-top:6px;">${bandsHtml}</div>` : ""}
        ${lidar ? `<div style="margin-top:6px;"><strong>Lidar:</strong><br>${lidar}</div>` : ""}
      </div>
    `;
  }

  // =========================
  // STATE AGENCY RENDER
  // =========================
  function renderStateInfo(stateAbbrev) {
  const stateNameEl = document.getElementById("state-name");
  const stateRecordsEl = document.getElementById("state-records");

  const fullName = STATE_NAME_MAP[stateAbbrev] || stateAbbrev || "Unknown";
  stateNameEl.textContent = `${fullName} (${stateAbbrev})`;
  stateRecordsEl.innerHTML = "";

  const rows = rowsByState.get(stateAbbrev) || [];
  if (rows.length === 0) {
    stateRecordsEl.innerHTML = "<p>No state agency data for this state yet.</p>";
    return;
  }

  rows.forEach((row, idx) => {
    const agency =
      row["Law_Enforcement_Agency_Name"] ||
      row["Agency"] ||
      row["Agency_Name"] ||
      row["Name"] ||
      "Unknown agency";

    const xVal  = hasValid(row["X_band"])  ? formatMulti(row["X_band"])  : "";
    const kaVal = hasValid(row["Ka_band"]) ? formatMulti(row["Ka_band"]) : "";
    const kVal  = hasValid(row["K_band"])  ? formatMulti(row["K_band"])  : "";
    const lidar = hasValid(row["Lidar_Guns"]) ? formatMulti(row["Lidar_Guns"]) : "";
    const tactics = hasValid(row["Special_Tactics"]) ? row["Special_Tactics"] : "";
    const notes = hasValid(row["Notes"]) ? row["Notes"] : "";

    // ✅ THIS WAS MISSING:
    const flags = flagsHtmlFromRow(row);

    let bandsHtml = "";
    if (xVal || kaVal || kVal) {
      bandsHtml += `<div><strong>Bands</strong></div>`;
      if (xVal)  bandsHtml += `<div>- <strong>X:</strong><br>${xVal}</div>`;
      if (kaVal) bandsHtml += `<div style="margin-top:4px;">- <strong>Ka:</strong><br>${kaVal}</div>`;
      if (kVal)  bandsHtml += `<div style="margin-top:4px;">- <strong>K:</strong><br>${kVal}</div>`;
    }

    const div = document.createElement("div");
    div.className = "record";
    div.innerHTML = `
      <div class="record-header">${idx + 1}. ${agency}</div>
      ${bandsHtml}
      ${lidar ? `<div style="margin-top:6px;"><strong>Lidar:</strong><br>${lidar}</div>` : ""}
      ${flags ? `${flags}` : ""}
      ${tactics ? `<div style="margin-top:6px;"><strong>Special tactics:</strong><br>${tactics}</div>` : ""}
      ${notes ? `<div style="margin-top:6px;"><strong>Notes:</strong><br>${notes}</div>` : ""}
    `;
    stateRecordsEl.appendChild(div);
  });
}


  function statePopupHtml(stateName, ab) {
    const rows = rowsByState.get(ab) || [];
    const count = rows.length;
    return `<strong>${stateName} (${ab})</strong><br>${count} state record${count === 1 ? "" : "s"} found.`;
  }

  // =========================
  // STYLES
  // =========================
  function styleForProps(props) {
    const geoid = normalizeGeoid(props.GEOID || props.geoid || props.GEOID10 || props.GEO_ID || "");

    const s = {
      weight: 1.4,
      color: "#111",
      opacity: 1,
      fill: true,
      fillColor: "#f2f2f2",
      fillOpacity: 0.20
    };

    if (!geoid) return s;

    if (kaFreqMode) {
      if (countyMatchesKaFreqSet(geoid, kaFreqChoice)) {
        if (kaFreqChoice === "33.8") s.fillColor = "#2b6cb0";
        else if (kaFreqChoice === "34.7") s.fillColor = "#1f9d8a";
        else if (kaFreqChoice === "35.5") s.fillColor = "#1a365d";
        else s.fillColor = "blue";
        s.fillOpacity = 0.60;
      }
      return s;
    }

    if (allMode) {
      if (hasAnyData.has(geoid)) {
        s.fillColor = "#0B6623";
        s.fillOpacity = 0.7;
      }
      return s;
    }

    if (selectedFilters.size === 0) return s;

    const matches = [];
    for (const f of FILTERS) {
      if (!selectedFilters.has(f)) continue;
      if (countyMatchesFilterSet(geoid, f)) matches.push(f);
    }
    if (matches.length === 0) return s;

    const colorMap = { x:"gold", k:"orange", ka:"blue", lidar:"red", de:"purple" };
    if (matches.length === 1) {
      s.fillColor = colorMap[matches[0]] || "green";
      s.fillOpacity = 0.50;
      return s;
    }

    s.fillColor = "cyan";
    s.fillOpacity = 0.55;
    s.weight = 2.0;
    return s;
  }

  // =========================
  // BUILD VECTORGRID (COUNTIES)
  // =========================
  async function rebuildLayer() {
    if (!geojsonCache) return;

    if (vgLayer) {
      map.removeLayer(vgLayer);
      vgLayer = null;
      selectedId = null;
    }

    vgLayer = L.vectorGrid.slicer(geojsonCache, {
      maxZoom: 12,
      tolerance: 3,
      extent: 4096,
      buffer: 256,
      rendererFactory: L.svg.tile,
      pane: "countiesPane",
      interactive: true,
      getFeatureId: f => {
        const p = (f && f.properties) ? f.properties : {};
        return normalizeGeoid(p.GEOID || p.geoid || p.GEOID10 || p.GEO_ID || "");
      },
      vectorTileLayerStyles: {
        sliced: props => styleForProps(props)
      }
    });

    vgLayer.addTo(map);

    vgLayer.on("click", (e) => {
      try {
        // If State Mode is on, ignore county clicks.
        if (stateMode) return;

        const props =
          (e && e.layer && e.layer.properties) ? e.layer.properties :
          (e && e.properties) ? e.properties :
          {};

        lastClickedProps = props;

        const geoid = normalizeGeoid(props.GEOID || props.geoid || props.GEOID10 || props.GEO_ID || "");

        if (selectedId) vgLayer.resetFeatureStyle(selectedId);
        selectedId = geoid || null;

        if (selectedId) {
          const sel = styleForProps(props);
          sel.weight = 3;
          sel.color = "#000";
          vgLayer.setFeatureStyle(selectedId, sel);
        }

        renderCountyInfo(props);

        L.popup()
          .setLatLng(e.latlng)
          .setContent(popupHtml(props))
          .openOn(map);
      } catch (err) {
        console.error("VG CLICK HANDLER ERROR:", err);
      }
    });
  }

  // =========================
  // KA DROPDOWN OPEN/CLOSE
  // =========================
  function setKaDropdown(open) {
    document.getElementById("kaDropdown").classList.toggle("open", !!open);
  }
  function isKaDropdownOpen() {
    return document.getElementById("kaDropdown").classList.contains("open");
  }

  // =========================
  // FILTER BUTTON UI
  // =========================
  function setButtonActive(btn, on) { btn.classList.toggle("active", !!on); }
  function setButtonDisabled(btn, on) { btn.classList.toggle("disabled", !!on); btn.disabled = !!on; }

  function renderFilterButtons() {
    const stateBtn = document.getElementById("stateModeBtn");
    setButtonActive(stateBtn, stateMode);

    document.querySelectorAll(".filter-btn[data-filter]").forEach(btn => {
      const f = btn.getAttribute("data-filter");

      if (kaFreqMode) {
        setButtonActive(btn, f === "ka");
        setButtonDisabled(btn, true);
      } else {
        setButtonDisabled(btn, false);
        if (f === "all") setButtonActive(btn, allMode);
        else setButtonActive(btn, allMode || selectedFilters.has(f));
      }
    });

    const kaArrowBtn = document.getElementById("kaArrowBtn");
    kaArrowBtn.classList.toggle("active", kaFreqMode);
    kaArrowBtn.disabled = false;
    kaArrowBtn.classList.remove("disabled");
  }

  // =========================
  // STATE LAYER (CLICKABLE)
  // =========================
  async function addStateBordersAndClickableStates() {
    const res = await fetch(STATE_BORDERS_URL);
    if (!res.ok) throw new Error("StateBorders fetch failed: " + res.status);
    const statesGeo = await res.json();

    map.createPane("statesPane");
    map.getPane("statesPane").style.zIndex = 690;   // above counties, below popups
    map.getPane("popupPane").style.zIndex = 900;    // popups always on top

    // Remove existing if present
    if (statesLayer) {
      map.removeLayer(statesLayer);
      statesLayer = null;
    }

    statesLayer = L.geoJSON(statesGeo, {
      pane: "statesPane",
      // Always add, but we will toggle interactivity via setStateMode()
      interactive: true,
      style: (feature) => ({
        color: "#000",
        weight: 4,
        opacity: 0.9,
        fill: true,          // IMPORTANT: clickable area
        fillOpacity: 0.00    // invisible fill
      }),
      onEachFeature: (feature, layer) => {
        layer.on("click", (e) => {
          if (!stateMode) return;

          const p = (feature && feature.properties) ? feature.properties : {};
          const ab = getStateAbbrevFromProps(p);
          if (!ab) return;

          lastClickedStateAbbrev = ab;

          const stateName = getStateNameFromProps(p, ab);

          renderStateInfo(ab);

          L.popup()
            .setLatLng(e.latlng)
            .setContent(statePopupHtml(stateName, ab))
            .openOn(map);
        });
      }
    }).addTo(map);

    setStateMode(stateMode); // apply initial interactivity state
  }

  function setStateMode(on) {
    stateMode = !!on;

    // Make the state layer actually clickable only in state mode
    if (statesLayer) {
      statesLayer.eachLayer(layer => {
        if (stateMode) {
          layer.options.interactive = true;
          if (layer.getElement) {
            const el = layer.getElement();
            if (el) el.style.pointerEvents = "auto";
          }
        } else {
          layer.options.interactive = false;
          if (layer.getElement) {
            const el = layer.getElement();
            if (el) el.style.pointerEvents = "none";
          }
        }
      });
    }

    // Also close Ka dropdown if open
    setKaDropdown(false);

    // Switch panels
    setPanelsForMode();

    // If turning on state mode, clear county selection popup expectation
    if (stateMode) {
      // keep map shading as-is; just change click behavior
      // show last selected state if available
      if (lastClickedStateAbbrev) renderStateInfo(lastClickedStateAbbrev);
      else {
        document.getElementById("state-name").textContent = "None selected";
        document.getElementById("state-records").innerHTML = "";
      }
    }

    renderFilterButtons();
  }

  // =========================
  // INIT FILTERS
  // =========================
  function initFilters() {
    // State mode toggle button
    document.getElementById("stateModeBtn").addEventListener("click", () => {
      setStateMode(!stateMode);
    });

    // Normal filter buttons
    document.querySelectorAll(".filter-btn[data-filter]").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (kaFreqMode) return;

        const f = btn.getAttribute("data-filter");

        if (f === "all") {
          allMode = true;
          selectedFilters = new Set(FILTERS);
        } else {
          if (allMode) allMode = false;

          if (selectedFilters.has(f)) selectedFilters.delete(f);
          else selectedFilters.add(f);

          allMode = (selectedFilters.size === FILTERS.length);
          if (allMode) selectedFilters = new Set(FILTERS);
        }

        renderFilterButtons();
        await rebuildLayer();
        if (lastClickedProps && !stateMode) renderCountyInfo(lastClickedProps);
      });
    });

    // Ka arrow opens dropdown
    document.getElementById("kaArrowBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      setKaDropdown(!isKaDropdownOpen());
    });

    // Ka dropdown selection enables/disables Ka freq mode
    document.getElementById("kaFreqSelect").addEventListener("change", async (e) => {
      const val = e.target.value;

      if (val === "off") {
        if (kaFreqMode) {
          kaFreqMode = false;
          allMode = savedAllMode;
          selectedFilters = new Set(savedSelectedFilters);
        }
      } else {
        if (!kaFreqMode) {
          savedAllMode = allMode;
          savedSelectedFilters = new Set(selectedFilters);
        }

        kaFreqMode = true;
        kaFreqChoice = val;

        allMode = false;
        selectedFilters = new Set(["ka"]);
      }

      renderFilterButtons();
      await rebuildLayer();
      if (lastClickedProps && !stateMode) renderCountyInfo(lastClickedProps);
    });

    // close Ka dropdown on outside click
    document.addEventListener("click", (e) => {
      const wrap = document.getElementById("kaSplit");
      if (!wrap.contains(e.target)) setKaDropdown(false);
    });

    renderFilterButtons();
  }

  // =========================
  // BOOTSTRAP
  // =========================
  async function bootstrap() {
    try {
      setStatus("Loading CSV data…");
      await Promise.all([loadCountyCsv(), loadStateAgencyCsv()]);

      setStatus("Loading shapes…");
      const geoRes = await fetch(GEOJSON_URL);
      if (!geoRes.ok) throw new Error("GeoJSON fetch failed: " + geoRes.status);
      geojsonCache = await geoRes.json();

      map = L.map("map").setView(DEFAULT_CENTER, DEFAULT_ZOOM);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      map.createPane("countiesPane");
      map.getPane("countiesPane").style.zIndex = 650;

      setStatus("Loading state borders…");
      await addStateBordersAndClickableStates();

      setTimeout(() => map.invalidateSize(), 0);
      window.addEventListener("resize", () => map.invalidateSize());

      initFilters();
      await rebuildLayer();
      setPanelsForMode();

      setStatus("Data loaded. Click a county, or toggle State mode to click states.");
    } catch (err) {
      console.error(err);
      setStatus("Error loading data. Open console for details.");
    }
  }

  bootstrap();
</script>
